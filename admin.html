<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | ZENVORA</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-surface: #121212;
            --border-glass: rgba(255, 255, 255, 0.1);
            --text-dim: #888;
        }

        body {
            background: #050505;
            color: white;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        .admin-nav {
            background: var(--bg-surface);
            padding: 20px 4%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-glass);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .admin-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .admin-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-glass);
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid var(--border-glass);
            color: white;
            border-radius: 4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            text-align: left;
            padding: 15px;
            border-bottom: 1px solid var(--border-glass);
        }

        .badge-status {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .status-new {
            background: #ff3e3e;
        }

        .status-done {
            background: #28a745;
        }

        #loginOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 5000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-size: 1rem;
            font-weight: 700;
            padding: 10px 20px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .tab-btn.active {
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
        }

        @media (max-width: 768px) {
            .admin-nav {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .admin-card {
                padding: 20px;
                overflow-x: auto;
            }

            table {
                min-width: 600px;
            }

            .tab-btn {
                padding: 10px;
                font-size: 0.8rem;
            }

            #loginOverlay .admin-card {
                width: 90% !important;
            }
        }
    </style>
</head>

<body>

    <div id="loginOverlay">
        <div class="admin-card" style="width: 400px; text-align: center;">
            <img src="assets/logo.png" alt="ZENVORA LOGO" style="width: 150px; margin-bottom: 20px;">
            <h2 style="margin-bottom: 20px; font-size: 1.2rem; color: var(--text-dim);">ADMIN ACCESS</h2>
            <input type="password" id="adminPass" placeholder="Enter Admin Password" style="margin-bottom: 20px;">
            <button class="btn btn-primary" onclick="checkAuth()" style="width: 100%;">Login</button>
        </div>
    </div>

    <div class="admin-nav">
        <div class="logo" style="display: flex; align-items: center; gap: 10px;">
            <img src="assets/logo.png" alt="ZENVORA LOGO" style="height: 40px;">
            <span style="font-size: 1.2rem; font-weight: 800;">ADMIN</span>
        </div>
        <div>
            <button class="tab-btn active" onclick="showTab('dashboard')">Dashboard</button>
            <button class="tab-btn" onclick="showTab('products')">Products</button>
            <button class="tab-btn" onclick="showTab('orders')">Orders</button>
            <button class="tab-btn" onclick="showTab('settings')">Settings</button>
            <a href="index.html" class="btn btn-outline" style="padding: 8px 15px; font-size: 0.8rem;">View Site</a>
        </div>
    </div>

    <div class="admin-container">
        <!-- Dashboard Tab -->
        <div id="dashboardTab">
            <div
                style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px;">
                <div class="admin-card" style="text-align: center;">
                    <i class="fa-solid fa-money-bill-trend-up"
                        style="font-size: 2rem; color: var(--primary-color); margin-bottom: 10px;"></i>
                    <h4 style="color: var(--text-dim);">Total Revenue</h4>
                    <h2 id="statRevenue">LKR 0</h2>
                </div>
                <div class="admin-card" style="text-align: center;">
                    <i class="fa-solid fa-cart-shopping"
                        style="font-size: 2rem; color: var(--primary-color); margin-bottom: 10px;"></i>
                    <h4 style="color: var(--text-dim);">Total Orders</h4>
                    <h2 id="statOrders">0</h2>
                </div>
                <div class="admin-card" style="text-align: center;">
                    <i class="fa-solid fa-box-open"
                        style="font-size: 2rem; color: var(--primary-color); margin-bottom: 10px;"></i>
                    <h4 style="color: var(--text-dim);">Total Products</h4>
                    <h2 id="statProducts">0</h2>
                </div>
                <div class="admin-card" style="text-align: center;">
                    <i class="fa-solid fa-users"
                        style="font-size: 2rem; color: var(--primary-color); margin-bottom: 10px;"></i>
                    <h4 style="color: var(--text-dim);">Visitors</h4>
                    <h2 id="statVisitors">0</h2>
                </div>
            </div>

            <div class="admin-card">
                <h3>Recent Sales Performance</h3>
                <canvas id="salesChart" style="width: 100%; height: 300px; margin-top: 20px;"></canvas>
            </div>
        </div>

        <!-- Products Tab -->
        <div id="productsTab" style="display: none;">
            <div class="admin-card">
                <h3>Add New Product</h3>
                <form id="productForm" style="margin-top: 20px;">
                    <div class="form-row">
                        <input type="text" id="pName" placeholder="Product Name" required>
                        <div style="display: flex; gap: 10px;">
                            <input type="number" id="pPrice" placeholder="Price (LKR)" required>
                            <input type="number" id="pStock" placeholder="Stock Qty" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <select id="pMainCat" onchange="updateSubCats()" required>
                            <option value="">Select Main Category</option>
                            <option value="Men">Men</option>
                            <option value="Women">Women</option>
                            <option value="Accessories">Accessories</option>
                        </select>
                        <select id="pSubCat" required>
                            <option value="">Select Sub-category</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <select id="pCollection">
                            <option value="">None (Standard Collection)</option>
                            <option value="Premium">Premium</option>
                            <option value="Oversize Tee">Oversize Tee</option>
                            <option value="Essentials">Essentials</option>
                            <option value="Seamless">Seamless</option>
                        </select>
                        <div class="form-row">
                            <div style="flex: 1;">
                                <label
                                    style="color: var(--text-dim); font-size: 0.8rem; margin-bottom: 5px; display: block;">Primary
                                    Image</label>
                                <input type="text" id="pImage" placeholder="Image URL 1" required>
                                <input type="file" id="pFile" accept="image/*" style="margin-top: 5px;">
                            </div>
                            <div style="flex: 1;">
                                <label
                                    style="color: var(--text-dim); font-size: 0.8rem; margin-bottom: 5px; display: block;">Image
                                    2</label>
                                <input type="text" id="pImage2" placeholder="Image URL 2">
                                <input type="file" id="pFile2" accept="image/*" style="margin-top: 5px;">
                            </div>
                            <div style="flex: 1;">
                                <label
                                    style="color: var(--text-dim); font-size: 0.8rem; margin-bottom: 5px; display: block;">Image
                                    3</label>
                                <input type="text" id="pImage3" placeholder="Image URL 3">
                                <input type="file" id="pFile3" accept="image/*" style="margin-top: 5px;">
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Save Product</button>
                </form>
            </div>

            <div class="admin-card">
                <h3>Current Products</h3>
                <div id="productsList">
                    <table>
                        <thead>
                            <tr>
                                <th>Image</th>
                                <th>Name</th>
                                <th>Category</th>
                                <th>Price</th>
                                <th>Stock</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Orders Tab -->
        <div id="ordersTab" style="display: none;">
            <div class="admin-card">
                <h3>Customer Orders</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Customer</th>
                            <th>Items</th>
                            <th>Total</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Settings Tab -->
        <div id="settingsTab" style="display: none;">
            <div class="admin-card">
                <h3>Brand Settings</h3>
                <form id="settingsForm" style="margin-top: 20px;">
                    <div class="form-row">
                        <div>
                            <label style="color: var(--text-dim); display: block; margin-bottom: 8px;">WhatsApp Number
                                (for checkout)</label>
                            <input type="text" id="settingWA" placeholder="e.g. 94701234567" required>
                        </div>
                        <div>
                            <label style="color: var(--text-dim); display: block; margin-bottom: 8px;">Admin Login
                                Password</label>
                            <input type="text" id="settingPass" placeholder="Admin Password" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div>
                            <label style="color: var(--text-dim); display: block; margin-bottom: 8px;">Delivery Charge
                                (LKR)</label>
                            <input type="number" id="settingDelivery" placeholder="e.g. 350" required>
                        </div>
                        <div></div>
                    </div>
                    <button type="submit" class="btn btn-primary">Update Settings</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, set, remove, update } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDp7G3C1mMeK1Htfsxharb05wtf0VTw88",
            authDomain: "studio-7cdf1.firebaseapp.com",
            databaseURL: "https://studio-7cdf1-default-rtdb.firebaseio.com",
            projectId: "studio-7cdf1",
            storageBucket: "studio-7cdf1.firebasestorage.app",
            messagingSenderId: "460661592780",
            appId: "1:460661592780:web:dc8fd00cad5541141e6869",
            measurementId: "G-Q8YJHFC1H1"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        const subCats = {
            "Men": ["T-Shirts", "Tanks", "Compressions", "Hoodies & Jackets", "Shorts", "Jeans", "Joggers & Pants", "Underwear"],
            "Women": ["T-Shirts", "Crop Tops", "Tanks", "Leggings", "Skirts", "Shorts", "Hoodies & Jackets", "Joggers & Pants", "One Piece", "Sports Bra", "Underwear"],
            "Accessories": ["Hats & Caps", "Shoes", "Slides", "Jewellery", "Socks", "Bottles & Tumblers", "Bags", "Merch", "Lifting Accessories"]
        };

        window.updateSubCats = () => {
            const main = document.getElementById('pMainCat').value;
            const sub = document.getElementById('pSubCat');
            sub.innerHTML = '<option value="">Select Sub-category</option>';
            if (subCats[main]) {
                subCats[main].forEach(c => {
                    sub.innerHTML += `<option value="${c}">${c}</option>`;
                });
            }
        };

        // --- AUTH & SETTINGS ---
        let adminSettings = { password: '69admin', waNumber: '94701234567' };
        onValue(ref(database, '69store/settings'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                adminSettings = data;
                document.getElementById('settingWA').value = data.waNumber || '';
                document.getElementById('settingPass').value = data.password || '';
                document.getElementById('settingDelivery').value = data.deliveryCharge || 0;
            }
        });

        window.checkAuth = () => {
            const pass = document.getElementById('adminPass').value;
            if (pass === adminSettings.password) {
                document.getElementById('loginOverlay').style.display = 'none';
                initDashboard();
                showTab('dashboard'); // Ensure dashboard is visible after login
            } else {
                showNotification('Access Denied: Invalid Password', 'error', 'Admin Auth');
            }
        };

        const sForm = document.getElementById('settingsForm');
        if (sForm) {
            sForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const waNumber = document.getElementById('settingWA').value;
                const password = document.getElementById('settingPass').value;
                const deliveryCharge = parseFloat(document.getElementById('settingDelivery').value) || 0;
                set(ref(database, '69store/settings'), { waNumber, password, deliveryCharge })
                    .then(() => showNotification('System settings synchronized successfully', 'success', 'System Update'));
            });
        }

        // --- TABS ---
        window.showTab = (tab) => {
            const tabs = ['dashboard', 'products', 'orders', 'settings'];
            tabs.forEach(t => {
                const el = document.getElementById(t + 'Tab');
                if (el) {
                    el.style.display = t === tab ? 'block' : 'none';
                }
            });

            document.querySelectorAll('.tab-btn').forEach(btn => {
                const btnText = btn.innerText.toLowerCase();
                btn.classList.toggle('active', btnText === tab);
            });
        };

        // --- DASHBOARD ANALYTICS ---
        let salesChart;
        const initDashboard = () => {
            // Stats & Chart
            onValue(ref(database, '69store'), (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                const products = data.products ? Object.keys(data.products).length : 0;
                const orders = data.orders ? Object.values(data.orders) : [];
                const visitors = data.visitors || 0;

                let revenue = 0;
                let dailySales = {};

                orders.forEach(o => {
                    if (o && o.total) revenue += o.total;
                    if (o && o.timestamp) {
                        const date = o.timestamp.split('T')[0];
                        dailySales[date] = (dailySales[date] || 0) + (o.total || 0);
                    }
                });

                document.getElementById('statProducts').textContent = products;
                document.getElementById('statOrders').textContent = orders.length;
                document.getElementById('statVisitors').textContent = visitors;
                document.getElementById('statRevenue').textContent = `LKR ${revenue.toLocaleString()}`;

                // Update Chart
                updateChart(dailySales);
            });
        };

        const updateChart = (dailySales) => {
            const ctx = document.getElementById('salesChart').getContext('2d');
            const labels = Object.keys(dailySales).sort().slice(-7); // Last 7 days
            const data = labels.map(l => dailySales[l]);

            if (salesChart) salesChart.destroy();

            salesChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Daily Sales (LKR)',
                        data: data,
                        borderColor: '#ff3e3e',
                        backgroundColor: 'rgba(255, 62, 62, 0.1)',
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } },
                        x: { grid: { color: 'rgba(255,255,255,0.05)' } }
                    },
                    plugins: {
                        legend: { labels: { color: '#ffffff' } }
                    }
                }
            });
        };

        // --- PRODUCTS MANAGEMENT ---
        const pForm = document.getElementById('productForm');
        pForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('pName').value;
            const price = parseFloat(document.getElementById('pPrice').value);
            const image = document.getElementById('pImage').value;
            const image2 = document.getElementById('pImage2').value || '';
            const image3 = document.getElementById('pImage3').value || '';
            const mainCat = document.getElementById('pMainCat').value;
            const subCat = document.getElementById('pSubCat').value;
            const collection = document.getElementById('pCollection').value;
            const stock = parseInt(document.getElementById('pStock').value) || 0;

            push(ref(database, '69store/products'), {
                name,
                price,
                stock,
                image,
                image2,
                image3,
                mainCat,
                subCat,
                collection,
                timestamp: new Date().toISOString()
            });
            pForm.reset();
            document.getElementById('pSubCat').innerHTML = '<option value="">Select Sub-category</option>';
            showNotification(`${name} has been forged and added to the collection`, 'success', 'Inventory');
        });

        document.getElementById('pFile').addEventListener('change', (e) => handleUpload(e, 'pImage'));
        document.getElementById('pFile2').addEventListener('change', (e) => handleUpload(e, 'pImage2'));
        document.getElementById('pFile3').addEventListener('change', (e) => handleUpload(e, 'pImage3'));

        function handleUpload(e, targetId) {
            const file = e.target.files[0];
            if (!file) return;

            // Show loading state on the label
            const label = e.target.previousElementSibling ? e.target.previousElementSibling.previousElementSibling : null;
            const originalText = label ? label.textContent : '';
            if (label) label.textContent = 'Compressing...';

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;

                    // Max dimensions
                    const MAX_WIDTH = 800;
                    const MAX_HEIGHT = 800;

                    if (width > height) {
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                    } else {
                        if (height > MAX_HEIGHT) {
                            width *= MAX_HEIGHT / height;
                            height = MAX_HEIGHT;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    // Compress to 0.7 quality
                    const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById(targetId).value = compressedBase64;

                    if (label) label.textContent = originalText;
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        onValue(ref(database, '69store/products'), (snapshot) => {
            const data = snapshot.val();
            const tbody = document.getElementById('productsTableBody');
            tbody.innerHTML = '';
            if (data) {
                Object.keys(data).forEach(key => {
                    const p = data[key];
                    tbody.innerHTML += `
                    <tr>
                        <td>
                            <div style="display: flex; gap: 2px;">
                                <img src="${p.image}" style="width: 30px; height: 30px; object-fit: cover; border-radius: 2px;">
                                ${p.image2 ? `<img src="${p.image2}" style="width: 30px; height: 30px; object-fit: cover; border-radius: 2px;">` : ''}
                                ${p.image3 ? `<img src="${p.image3}" style="width: 30px; height: 30px; object-fit: cover; border-radius: 2px;">` : ''}
                            </div>
                        </td>
                        <td>${p.name}<br><small style="color: var(--primary-color)">${p.collection || ''}</small></td>
                        <td><small>${p.mainCat || 'Uncategorized'} > ${p.subCat || '-'}</small></td>
                        <td>LKR ${p.price.toLocaleString()}</td>
                        <td>
                            <input type="number" value="${p.stock || 0}" 
                                   style="width: 60px; background: #000; border: 1px solid ${p.stock > 10 ? '#28a745' : p.stock > 0 ? '#ffc107' : '#ff3e3e'}; color: #fff; padding: 5px; border-radius: 4px; text-align: center; font-weight: 800;"
                                   onchange="updateStock('${key}', this.value)">
                        </td>
                        <td><button class="btn btn-outline" style="color: #ff3e3e;" onclick="deleteProduct('${key}')">Delete</button></td>
                    </tr>
    `;
                });
            }
        });

        window.deleteProduct = (key) => {
            if (confirm('Delete product?')) remove(ref(database, `69store/products/${key}`));
        };

        window.updateStock = (key, val) => {
            const stock = parseInt(val) || 0;
            update(ref(database, `69store/products/${key}`), { stock });
        };

        // --- ORDERS MANAGEMENT ---
        onValue(ref(database, '69store/orders'), (snapshot) => {
            const data = snapshot.val();
            const tbody = document.getElementById('ordersTableBody');
            tbody.innerHTML = '';
            if (data) {
                Object.keys(data).reverse().forEach(key => {
                    const o = data[key];
                    if (!o || !o.customer) return; // Skip malformed orders
                    tbody.innerHTML += `
                    <tr>
                        <td>${o.timestamp ? new Date(o.timestamp).toLocaleDateString() : 'N/A'}</td>
                        <td>${o.customer.name || 'Unknown'}<br><small>${o.customer.phone || ''}</small></td>
                        <td>${o.items ? o.items.map(i => i.name).join(', ') : 'No items'}</td>
                        <td>LKR ${o.total ? o.total.toLocaleString() : '0'}</td>
                        <td><span class="badge-status ${o.status === 'New' ? 'status-new' : 'status-done'}">${o.status || 'New'}</span></td>
                        <td>
                            <button class="btn btn-outline" onclick="toggleOrder('${key}', '${o.status || 'New'}')">Toggle Status</button>
                            <button class="btn btn-outline" style="color: #ff3e3e;" onclick="deleteOrder('${key}')">Delete</button>
                        </td>
                    </tr>
                    `;
                });
            }
        });

        window.toggleOrder = (key, current) => {
            const newStatus = current === 'New' ? 'Completed' : 'New';
            update(ref(database, `69store/orders/${key}`), { status: newStatus });
        };

        window.deleteOrder = (key) => {
            if (confirm('Delete order?')) remove(ref(database, `69store/orders/${key}`));
        };

        // Auto-login during development (optional)
        // document.getElementById('adminPass').value = '69admin';
    </script>
    <script src="script.js"></script>
</body>

</html>
